<!DOCTYPE html>
<html>
<head>
    <title>Smart Student Assistant</title>
    
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            text-align: center;
            color: white;
        }

        h1 {
            margin-top: 40px;
        }

        #chatbox {
            background: white;
            width: 400px;
            margin: 30px auto;
            padding: 15px;
            border-radius: 10px;
            height: 350px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .user {
            align-self: flex-end;
            background: #007bff;
            color: white;
            padding: 10px 14px;
            border-radius: 15px;
            margin: 5px;
            max-width: 70%;
        }

        .bot {
            align-self: flex-start;
            background: #f1f1f1;
            color: black;
            padding: 10px 14px;
            border-radius: 15px;
            margin: 5px;
            max-width: 70%;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from {opacity: 0;}
            to {opacity: 1;}
        }

        input {
            width: 250px;
            padding: 10px;
            border-radius: 5px;
            border: none;
        }

        button {
            padding: 10px 15px;
            border: none;
            background: #4facfe;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #007bff;
        }
    </style>
</head>

<body>

<h1>🎓 Smart Student Assistant 🤖</h1>
<p>This chatbot uses NLP and Machine Learning (Naive Bayes) to understand user queries.</p>

<div id="chatbox">
    <div class="bot">Hello! I am your Smart Student Assistant 🤖</div>
</div>

<input id="input" type="text" placeholder="Ask about study, internship, placement...">
<button onclick="sendMessage()">Send</button>
<button onclick="clearChat()">Clear</button>

<script>
function sendMessage() {
    let inputField = document.getElementById("input");
    let msg = inputField.value;

    if(msg === "") return;

    let chatbox = document.getElementById("chatbox");

    chatbox.innerHTML += "<div class='user'>" + msg + "</div>";

    chatbox.innerHTML += "<div class='bot' id='typing'>Typing...</div>";

    fetch("/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message: msg})
    })
    .then(response => response.json())
    .then(data => {
        document.getElementById("typing").remove();
        chatbox.innerHTML += "<div class='bot'>" + data.response + "</div>";
        chatbox.scrollTop = chatbox.scrollHeight;
    });

    inputField.value = "";
}

// Enter key
document.getElementById("input").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        sendMessage();
    }
});

// Clear chat
function clearChat() {
    document.getElementById("chatbox").innerHTML =
    "<div class='bot'>Chat cleared. Start again 😊</div>";
}
</script>

</body>
</html>
